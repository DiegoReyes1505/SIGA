<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIGA - Asistencias</title>
  <link rel="stylesheet" href="/css/app.css" />
  <link rel="stylesheet" href="/css/modules.css" />
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="brand">SIGA</div>
    <div id="readerStatusBadge" class="reader-badge">Cargando lector...</div>
    <nav id="sidebarNav" class="sidebar-nav"></nav>
  </aside>
  <main class="content">
    <header class="page-header">
      <h1>Asistencias</h1>
      <p>Consulta, registra y corrige asistencias manualmente.</p>
    </header>

    <!-- Filtros -->
    <section class="card">
      <h2>Filtros</h2>
      <div class="filters-grid">
        <div class="filter-group">
          <label>Grupo</label>
          <select id="filtroGrupo"><option value="">Todos</option></select>
        </div>
        <div class="filter-group">
          <label>Alumno</label>
          <select id="filtroAlumno"><option value="">Todos</option></select>
        </div>
        <div class="filter-group">
          <label>Tipo</label>
          <select id="filtroTipo">
            <option value="">Todos</option>
            <option value="asistencia">Asistencia</option>
            <option value="retardo">Retardo</option>
            <option value="falta">Falta</option>
            <option value="permiso">Permiso</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Fecha inicio</label>
          <input type="date" id="filtroFechaInicio" />
        </div>
        <div class="filter-group">
          <label>Fecha fin</label>
          <input type="date" id="filtroFechaFin" />
        </div>
      </div>
      <div class="filters-actions">
        <button class="btn primary" id="btnBuscar">Buscar</button>
        <button class="btn" id="btnLimpiar">Limpiar</button>
        <button class="btn success" id="btnNuevo">+ Registro manual</button>
      </div>
    </section>

    <!-- Tabla -->
    <section class="card">
      <div class="toolbar">
        <h2>Resultados <span id="totalLabel" class="muted-label"></span></h2>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Fecha</th><th>Alumno</th><th>Grupo</th><th>Materia</th><th>Tipo</th><th>Hora entrada</th><th>Por</th><th>Acciones</th></tr></thead>
          <tbody id="tablaAsistencias"></tbody>
        </table>
      </div>
      <div class="paginacion">
        <button class="btn btn-sm" id="btnAnterior" disabled>← Anterior</button>
        <span class="pagina-info" id="paginaInfo"></span>
        <button class="btn btn-sm" id="btnSiguiente" disabled>Siguiente →</button>
      </div>
    </section>
  </main>
</div>

<!-- Modal registro/edición -->
<div id="modalAsistencia" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="modal-header">
      <h2 id="modalTitle">Registro manual</h2>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>
    <form id="asistenciaForm">
      <input type="hidden" id="asistenciaId" />
      <div class="grid">
        <div>
          <label for="m_grupo_id">Grupo</label>
          <select id="m_grupo_id" required></select>
        </div>
        <div>
          <label for="m_alumno_id">Alumno</label>
          <select id="m_alumno_id" required></select>
        </div>
        <div>
          <label for="m_horario_id">Horario / Materia</label>
          <select id="m_horario_id" required></select>
        </div>
        <div>
          <label for="m_fecha">Fecha</label>
          <input type="date" id="m_fecha" required />
        </div>
        <div>
          <label for="m_tipo">Tipo</label>
          <select id="m_tipo" required>
            <option value="asistencia">Asistencia</option>
            <option value="retardo">Retardo</option>
            <option value="falta">Falta</option>
            <option value="permiso">Permiso</option>
          </select>
        </div>
        <div>
          <label for="m_hora_entrada">Hora entrada (opcional)</label>
          <input type="time" id="m_hora_entrada" />
        </div>
        <div class="full">
          <label for="m_nota">Nota (opcional)</label>
          <textarea id="m_nota" style="min-height:70px"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn" id="modalCancelar">Cancelar</button>
        <button type="submit" class="btn primary" id="modalGuardar">Guardar</button>
      </div>
    </form>
  </div>
</div>

<div id="toastContainer" class="toast-container"></div>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="/js/common.js"></script>
<script src="/js/asistencias.js"></script>
</body>
</html>
