<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIGA - Grupos</title>
  <link rel="stylesheet" href="/css/app.css" />
  <link rel="stylesheet" href="/css/modules.css" />
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="brand">SIGA</div>
    <div id="readerStatusBadge" class="reader-badge">Cargando lector...</div>
    <nav id="sidebarNav" class="sidebar-nav"></nav>
  </aside>
  <main class="content">
    <header class="page-header">
      <h1>Grupos</h1>
      <p>Administra los grupos escolares.</p>
    </header>

    <!-- Formulario -->
    <section class="card">
      <h2 id="formTitle">Nuevo grupo</h2>
      <form id="grupoForm">
        <input type="hidden" id="grupoId" />
        <div class="grid">
          <div>
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" placeholder="Ej: 3°A" required />
          </div>
          <div>
            <label for="descripcion">Descripción (opcional)</label>
            <input type="text" id="descripcion" placeholder="Ej: Turno matutino" />
          </div>
        </div>
        <div class="actions">
          <button type="submit" class="btn primary" id="btnGuardar">Guardar grupo</button>
          <button type="button" class="btn" id="btnCancelar">Cancelar</button>
        </div>
      </form>
    </section>

    <!-- Tabla -->
    <section class="card">
      <div class="toolbar">
        <h2>Listado de grupos</h2>
        <div class="toolbar-right">
          <input type="text" id="busqueda" placeholder="Buscar..." />
          <label class="checkbox-row compact">
            <input type="checkbox" id="verInactivos" />
            <span>Mostrar inactivos</span>
          </label>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Nombre</th><th>Descripción</th><th>Alumnos</th><th>Estatus</th><th>Acciones</th></tr></thead>
          <tbody id="tablaGrupos"></tbody>
        </table>
      </div>
    </section>
  </main>
</div>
<div id="toastContainer" class="toast-container"></div>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="/js/common.js"></script>
<script src="/js/grupos.js"></script>
</body>
</html>
